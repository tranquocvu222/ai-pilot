<!DOCTYPE html>
<html
  lang="eng"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <!--/*/ <th:block th:include="fragments/head :: head"></th:block> /*/-->
    <title>Create Notification</title>
  </head>

  <body>
    <header>
      <!--/*/ <th:block th:include="fragments/header :: header('notifications')"></th:block> /*/-->
    </header>

    <main class="container">
      <div class="card mb-3">
        <div
          class="card-header d-flex justify-content-between align-items-center"
        >
          <h1 class="my-highest-header mb-0">Create New Notification</h1>
          <a href="/notifications" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Back to Notifications
          </a>
        </div>

        <div class="card-body">
          <form th:action="@{/notifications/create}" method="post">
            <div class="form-group">
              <label for="message"
                >Notification Message <span class="text-danger">*</span></label
              >
              <textarea
                class="form-control"
                id="message"
                name="message"
                rows="4"
                placeholder="Enter notification message..."
                required
              ></textarea>
              <small class="form-text text-muted">
                This notification will be sent to selected users in the system.
              </small>
            </div>

            <div class="form-group">
              <label for="targetUsers">Send to</label>
              <select class="form-control" id="targetUsers" name="targetUsers">
                <option value="ALL">All Users</option>
                <option value="USER_ONLY">Regular Users Only</option>
                <option value="ADMIN_ONLY">Admins Only</option>
              </select>
            </div>

            <div class="form-group">
              <button type="submit" class="btn btn-success">
                <i class="fas fa-paper-plane"></i> Send Notification
              </button>
              <a href="/notifications" class="btn btn-outline-secondary ml-2"
                >Cancel</a
              >
            </div>
          </form>
        </div>
      </div>

      <!-- Preview Section -->
      <div class="card">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0"><i class="fas fa-eye"></i> Live Preview</h5>
        </div>
        <div class="card-body">
          <div class="notification-preview-container">
            <div class="notification-preview" id="messagePreview">
              <div class="notification-content">
                <div class="notification-icon">
                  <i class="fas fa-bell text-primary"></i>
                </div>
                <div class="notification-text">
                  <span class="text-muted"
                    >Your notification message will appear here...</span
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <!--/*/ <th:block th:include="fragments/footer :: footer"></th:block> /*/-->
    </footer>

    <!--remain scroll position after redirect-->
    <script src="js/main.js"></script>

    <!-- Custom CSS for preview -->
    <style>
      .notification-preview-container {
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        border-radius: 10px;
        padding: 20px;
        min-height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .notification-preview {
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        padding: 15px 20px;
        border-left: 4px solid #007bff;
        max-width: 500px;
        width: 100%;
      }

      .notification-content {
        display: flex;
        align-items: flex-start;
        gap: 12px;
      }

      .notification-icon {
        font-size: 18px;
        margin-top: 2px;
      }

      .notification-text {
        flex: 1;
        line-height: 1.5;
        font-size: 14px;
      }

      .notification-preview.has-content .notification-text {
        color: #333;
        font-weight: 500;
      }
    </style>

    <!-- Real-time preview script -->
    <script>
      document.getElementById("message").addEventListener("input", function () {
        const message = this.value;
        const preview = document.getElementById("messagePreview");
        const textElement = preview.querySelector(".notification-text");

        if (message.trim()) {
          textElement.innerHTML = message;
          preview.classList.add("has-content");
        } else {
          textElement.innerHTML =
            '<span class="text-muted">Your notification message will appear here...</span>';
          preview.classList.remove("has-content");
        }
      });
    </script>
  </body>
</html>
