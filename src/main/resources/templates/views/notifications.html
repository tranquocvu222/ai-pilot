<!DOCTYPE html>
<html
  lang="eng"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <!--/*/ <th:block th:include="fragments/head :: head"></th:block> /*/-->
    <title>Notifications</title>
  </head>

  <body>
    <header>
      <!--/*/ <th:block th:include="fragments/header :: header('notifications')"></th:block> /*/-->
    </header>

    <main class="container">
      <div class="card mb-3">
        <div
          class="card-header d-flex justify-content-between align-items-center"
        >
          <h1 class="my-highest-header mb-0">Notifications</h1>
          <a
            sec:authorize="hasRole('ROLE_ADMIN')"
            href="/notifications/create"
            class="btn btn-primary"
          >
            <i class="fas fa-plus"></i> Create Notification
          </a>
        </div>

        <div class="card card-body">
          <table class="table table-striped table-hover">
            <thead class="thead-light">
              <tr>
                <th>Select</th>
                <th>Message</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="notification : ${notifications}">
                <td>
                  <input
                    type="checkbox"
                    name="ids"
                    th:value="${notification.id}"
                  />
                </td>
                <td th:text="${notification.message}"></td>
                <td th:text="${notification.status}"></td>
                <td>
                  <form
                    th:action="@{'/notifications/' + ${notification.id} + '/read'}"
                    method="post"
                    style="display: inline"
                  >
                    <button
                      type="submit"
                      th:class="${#strings.equalsIgnoreCase(notification.status, 'read')} ? 'btn btn-sm btn-secondary' : 'btn btn-sm btn-success'"
                      th:title="${#strings.equalsIgnoreCase(notification.status, 'read')} ? 'Already Read' : 'Mark as Read'"
                      th:disabled="${#strings.equalsIgnoreCase(notification.status, 'read')}"
                      th:style="${#strings.equalsIgnoreCase(notification.status, 'read')} ? 'opacity: 0.5; cursor: not-allowed;' : ''"
                    >
                      <i
                        th:class="${#strings.equalsIgnoreCase(notification.status, 'read')} ? 'fas fa-check-double' : 'fas fa-check'"
                      ></i>
                    </button>
                  </form>
                  <form
                    th:action="@{'/notifications/' + ${notification.id}}"
                    method="post"
                    style="display: inline"
                  >
                    <input type="hidden" name="_method" value="delete" />
                    <button
                      type="submit"
                      class="btn btn-sm btn-outline-danger"
                      title="Delete"
                    >
                      <i class="fas fa-trash"></i>
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <footer class="footer">
      <!--/*/ <th:block th:include="fragments/footer :: footer"></th:block> /*/-->
    </footer>

    <!--remain scroll position after redirect-->
    <script src="js/main.js"></script>
  </body>
</html>
