<!DOCTYPE html>
<html lang="eng"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <!--/*/ <th:block th:include="fragments/head :: head"></th:block> /*/-->
    <title>Notifications</title>
</head>

<body>

<header>
    <!--/*/ <th:block th:include="fragments/header :: header('notifications')"></th:block> /*/-->
</header>

<main class="container">

    <div class="card mb-3">

        <h1 class="my-highest-header card-header">Notifications</h1>

        <div class="card card-body">
			<table>
            <thead>
                <tr>
                    <th>Select</th>
                    <th>Message</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="notification : ${notifications}">
                    <td>
                        <input type="checkbox" name="ids" th:value="${notification.id}" />
                    </td>
                    <td th:text="${notification.message}"></td>
                    <td th:text="${notification.status}"></td>
                    <td>
                        <form th:action="@{'/notifications/' + ${notification.id} + '/read'}" method="post">
                            <button type="submit">Mark as Read</button>
                        </form>
                        <form th:action="@{'/notifications/' + ${notification.id}}" method="post">
                            <input type="hidden" name="_method" value="delete" />
                            <button type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        </div>
    </div>
</main>

<footer class="footer">
    <!--/*/ <th:block th:include="fragments/footer :: footer"></th:block> /*/-->
</footer>

<!--remain scroll position after redirect-->
<script src="js/main.js"></script>

</body>
</html>
